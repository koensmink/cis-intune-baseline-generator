
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
<defs>
<style>
.title { font-family:Segoe UI,Arial; font-size:28px; fill:#7dd3fc; font-weight:700; }
.box { fill:#0f172a; stroke:#a78bfa; stroke-width:2; rx:14; }
.text { font-family:Segoe UI,Arial; font-size:15px; fill:#e2e8f0; }
.arrow { stroke:#c084fc; stroke-width:3; marker-end:url(#arrow); }
</style>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
<polygon points="0 0, 6 3, 0 6" fill="#c084fc"/>
</marker>
</defs>

<rect width="1200" height="500" fill="#020617"/>

<text x="40" y="70" class="title">Intune Policy Generation Model</text>

<rect class="box" x="200" y="120" width="200" height="80"/>
<text class="text" x="235" y="165">CIS Control</text>

<rect class="box" x="200" y="240" width="200" height="80"/>
<text class="text" x="235" y="285">Rule Pack</text>

<rect class="box" x="500" y="240" width="200" height="80"/>
<text class="text" x="525" y="285">Policy Object</text>

<rect class="box" x="800" y="240" width="220" height="80"/>
<text class="text" x="820" y="285">Intune Settings Catalog</text>

<rect class="box" x="500" y="360" width="200" height="80"/>
<text class="text" x="525" y="405">Intune Baseline</text>

<line class="arrow" x1="300" y1="200" x2="300" y2="240"/>
<line class="arrow" x1="400" y1="280" x2="500" y2="280"/>
<line class="arrow" x1="700" y1="280" x2="800" y2="280"/>
<line class="arrow" x1="600" y1="320" x2="600" y2="360"/>
</svg>
