
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420">
<defs>
<style>
.title { font-family:Segoe UI,Arial; font-size:28px; fill:#7dd3fc; font-weight:700; }
.box { fill:#0f172a; stroke:#38bdf8; stroke-width:2; rx:14; }
.text { font-family:Segoe UI,Arial; font-size:15px; fill:#e2e8f0; }
.arrow { stroke:#7dd3fc; stroke-width:3; marker-end:url(#arrow); }
</style>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
<polygon points="0 0, 6 3, 0 6" fill="#7dd3fc"/>
</marker>
</defs>

<rect width="1200" height="420" fill="#020617"/>

<text x="40" y="60" class="title">CIS → Intune Mapping Flow</text>

<rect class="box" x="60" y="150" width="180" height="80"/>
<text class="text" x="90" y="195">CIS Control</text>

<rect class="box" x="300" y="150" width="180" height="80"/>
<text class="text" x="325" y="195">Normalizer</text>

<rect class="box" x="540" y="150" width="180" height="80"/>
<text class="text" x="560" y="195">Value Parser</text>

<rect class="box" x="780" y="150" width="180" height="80"/>
<text class="text" x="810" y="195">Rule Engine</text>

<rect class="box" x="1020" y="150" width="160" height="80"/>
<text class="text" x="1040" y="195">Intune Policy</text>

<line class="arrow" x1="240" y1="190" x2="300" y2="190"/>
<line class="arrow" x1="480" y1="190" x2="540" y2="190"/>
<line class="arrow" x1="720" y1="190" x2="780" y2="190"/>
<line class="arrow" x1="960" y1="190" x2="1020" y2="190"/>
</svg>
