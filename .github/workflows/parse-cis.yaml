name: Parse CIS PDF to CSV

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Profile filter (L1/L2/NG)"
        required: true
        default: "L1"
      pdf_path:
        description: "Path on runner to CIS PDF (e.g. /data/cis/CIS_...pdf). Runner must have access."
        required: true
      output_name:
        description: "Artifact name"
        required: true
        default: "cis-controls-csv"

jobs:
  parse:
    # Strongly prefer self-hosted to avoid uploading CIS PDFs to GitHub.
    runs-on: [self-hosted, linux]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Parse
        run: |
          python -m cis_pdf2csv "${{ inputs.pdf_path }}" -p "${{ inputs.profile }}" -o out.csv --format csv

      - name: Upload CSV artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.output_name }}
          path: out.csv
